id: https://w3id.org/NFDI4Chem/ms-dcat-ap
name: ms-dcat-ap
title: ms-dcat-ap
description: |-
  A dcat ap implementing the recommendations for the MS MIChI.
license: MIT
see_also:
  - https://NFDI4Chem.github.io/ms-dcat-ap
prefixes:
  linkml: https://w3id.org/linkml/
  MS: http://purl.obolibrary.org/obo/MS_
  material_entities_ap: https://w3id.org/nfdi-de/dcat-ap-plus/materials/
  chemdcatap: https://w3id.org/nfdi-de/dcat-ap-plus/chemistry/
  chemical_entities_ap: https://w3id.org/nfdi-de/dcat-ap-plus/chemistry/entity/
  chemical_reaction_ap: https://w3id.org/nfdi-de/dcat-ap-plus/chemistry/reaction/
  dcatapplus: https://w3id.org/nfdi-de/dcat-ap-plus/
  dcat: http://www.w3.org/ns/dcat#
  CHMO: http://purl.obolibrary.org/obo/CHMO_

imports:
  - linkml:types
  - chemdcatap:latest/schema/chem_dcat_ap

classes:

  MSAssay:
    # no inheritance, as chemdcatap:Assay does not exist
    description: Mass spectrometry assay (OBI:0000470) for liquid samples according to MIChI.
    slots:
      - ms_sample
      - instrument
      - software
      - acquisition_parameters
      - data_processing

  MSSample:
    is_a: SubstanceSample
    description: Sample that has been investigated by a chemical analysis by mass spectrometry.
    slots:
      - analysed_compound
      - sample_id
      - concentration_of_analyte
      - solvent
      - injection_volume

  MSInstrument:
    # no inheritance, as chemdcatap:Instrument does not exist
    description: Mass spectrometer and associated components.
    slots:
      - manufacturer
      - model
      - mass_analyzer_type
      - ionization_type
      - detector_type
      - notes

  MSSoftware:
    # no inheritance, as chemdcatap:Software does not exist
    description: Software used for MS experiments.
    slots:
      - software_purpose
      - software_name
      - software_version

  MSAcquisitionParameters:
    description: Parameters used during data acquisition in mass spectrometry.
    slots:
      - acquisition_mode
      - scan_polarity
      - scan_window_lower_limit
      - scan_window_upper_limit
      - ms1_median_cycle_frequency

  MSDataProcessing:
    description: Processing steps and evaluation parameters for MS data.
    slots:
      - peak_thresholding
      - level_of_identification_confidence
      - level_of_identification_confidence_standard
      - spectrum_representation
      - base_peak_mz
      - base_peak_intensity

slots:
  ms_sample:
    range: MSSample
    description: The investigated sample.
  instrument:
    range: MSInstrument
    description: The mass spectrometer used.
  software:
    range: MSSoftware
    multivalued: true
    description: Software used.
  acquisition_parameters:
    range: MSAcquisitionParameters
    description: Data acquisition parameters.
  data_processing:
    range: MSDataProcessing
    description: Data processing steps for MS data.
  analysed_compound:
    range: string
    multivalued: true
    description: Analysed compound (ChEBI ID, PubChem ID, etc.).
  sample_id:
    range: uriorcurie
    multivalued: true
    description: URI that uniquely identifies the sample.
  concentration_of_analyte:
    range: string
    multivalued: true
    description: Concentration of the analysed compound (with unit).
  solvent:
    range: string
    multivalued: true
    description: Solvent used (ChEBI ID or IRI).
  injection_volume:
    range: string
    description: Injection volume (with unit).
  manufacturer:
    range: string
    description: Manufacturer of the instrument.
  model:
    range: string
    description: Model designation of the instrument.
  mass_analyzer_type:
    range: string
    description: Type of mass analyzer (MS ID).
  ionization_type:
    range: string
    description: Ionization type (MS ID).
  detector_type:
    range: string
    description: Detector type (MS ID).
  notes:
    range: string
    description: Free text for instrument details.
  software_purpose:
    range: string
    description: Purpose of the software (e.g. analysis, acquisition).
  software_name:
    range: string
    description: Name of the software.
  software_version:
    range: string
    description: Version of the software.
  acquisition_mode:
    range: string
    description: Mode of data acquisition.
  scan_polarity:
    range: ScanPolarityEnum
    description: Scan polarity.
  scan_window_lower_limit:
    range: string
    description: Lower limit of the scan window (m/z).
  scan_window_upper_limit:
    range: string
    description: Upper limit of the scan window (m/z).
  ms1_median_cycle_frequency:
    range: string
    description: MS1 cycle frequency (Hz).
  peak_thresholding:
    range: string
    description: Threshold for peaks.
  level_of_identification_confidence:
    range: string
    description: Level of identification confidence.
  level_of_identification_confidence_standard:
    range: uriorcurie
    description: Source of the identification confidence standard.
  spectrum_representation:
    range: string
    description: Type of spectrum representation (MS ID).
  base_peak_mz:
    range: string
    description: m/z of the base peak.
  base_peak_intensity:
    range: string
    description: Intensity of the base peak.

